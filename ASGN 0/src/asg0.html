<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>asg0</title>
</head>

<body>
  <canvas id="example" width="400" height="400">
    Please use a browser that supports "canvas"
  </canvas>
  <br><br>

  <label for="v1x">v1: x</label>
  <input type="number" id="v1x" value="0">

  <label for="v1y">y</label>
  <input type="number" id="v1y" value="5">
  <br>

  <label for="v2x">v2: x</label>
  <input type="number" id="v2x" value="5">

  <label for="v2y">y</label>
  <input type="number" id="v2y" value="0">
  <br>

  <button onclick="handleDrawEvent()">Draw</button>

  <br><br>

  <label for="operation">Operation:</label>
  <select id="operation">
    <option value="add">Add</option>
    <option value="sub">Sub</option>
    <option value="mul">Mul</option>
    <option value="div">Div</option>
    <option value="magnitude">Magnitude</option>
    <option value="normalize">Normalize</option>
    <option value="angle">Angle between</option>
    <option value="area">Area</option>
  </select>

  <label for="scalar">Scalar:</label>
  <input type="number" id="scalar" value="2">

  <button onclick="handleDrawOperationEvent()">Draw</button>

  <script src="../lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
